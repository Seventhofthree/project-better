<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#182a24" />
  <title>Pathfinder</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=1.1" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Pathfinder</p>
        <h1 id="page-title">Today</h1>
      </div>
      <div class="date-controls" aria-label="Date controls">
        <button class="ghost small" id="prev-day" title="Previous day">‹</button>
        <input type="date" id="date-picker" aria-label="Selected date" />
        <button class="ghost small" id="next-day" title="Next day">›</button>
        <button class="ghost small" id="today-btn">Today</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Main navigation">
      <button data-tab="today" class="active">Today</button>
      <button data-tab="meals">Meals</button>
      <button data-tab="food">Food</button>
      <button data-tab="exercise">Exercise</button>
      <button data-tab="guide">Guide</button>
      <button data-tab="routines">Routines</button>
      <button data-tab="assistant">Assistant</button>
      <button data-tab="progress">Progress</button>
      <button data-tab="review">Review</button>
      <button data-tab="history">History</button>
      <button data-tab="settings">Settings</button>
    </nav>

    <main id="app" tabindex="-1">
      <section class="card highlight">
        <h2>Loading Pathfinder…</h2>
        <p>Starting Pathfinder 1.1 durable data foundation.</p>
      </section>
    </main>
  </div>

  <template id="toast-template">
    <div class="toast" role="status"></div>
  </template>

  <script>
    window.__PATHFINDER_RELEASE__ = {
      release: '1.1 Durable Data Foundation',
      bootstrapVersion: 'removed',
      coreAppVersion: '1.1',
      serviceWorkerCache: 'pathfinder-1.1'
    };
  </script>
  <script type="module" src="app.js?v=1.1"></script>
</body>
</html>
