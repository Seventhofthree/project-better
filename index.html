<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#182a24" />
  <title>Pathfinder</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=1.4" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-main">
        <div>
          <p class="eyebrow">Pathfinder</p>
          <h1 id="page-title">Today</h1>
        </div>
        <div class="date-controls" aria-label="Date controls">
          <button class="ghost small" id="prev-day" title="Previous day">‹</button>
          <input type="date" id="date-picker" aria-label="Selected date" />
          <button class="ghost small" id="next-day" title="Next day">›</button>
          <button class="ghost small" id="today-btn">Today</button>
        </div>
      </div>
      <button class="ghost topbar-settings" data-section="settings" aria-label="Open Settings" title="Settings"><span aria-hidden="true">⚙</span></button>
    </header>

    <nav class="tabs primary-tabs" aria-label="Daily navigation">
      <button data-section="today" class="active">Today</button>
      <button data-section="food">Food</button>
      <button data-section="movement">Movement</button>
      <button data-section="progress">Progress</button>
    </nav>

    <main id="app" tabindex="-1">
      <section class="card highlight">
        <h2>Loading Pathfinder…</h2>
        <p>Starting Pathfinder 1.4 food tracking.</p>
      </section>
    </main>
  </div>

  <template id="toast-template">
    <div class="toast" role="status"></div>
  </template>

  <script>
    window.__PATHFINDER_RELEASE__ = {
      release: '1.4 Food Depth & Calorie Tracking',
      bootstrapVersion: 'removed',
      coreAppVersion: '1.4',
      serviceWorkerCache: 'pathfinder-1.4'
    };
  </script>
  <script type="module" src="app.js?v=1.4"></script>
</body>
</html>
